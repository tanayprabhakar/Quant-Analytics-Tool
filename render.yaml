databases:
  - name: quant-db
    databaseName: quantdb
    user: quantuser
    plan: free # Use free tier for database if available

services:
  - type: web
    name: quant-backend
    env: python
    plan: free # Use free tier for web service
    rootDir: backend # Build context is backend folder
    buildCommand: pip install -r requirements.txt && python run_migration.py
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: quant-db
          property: connectionString
      - key: CORS_ORIGINS
        value: "https://your-vercel-frontend-url.vercel.app" # To be updated by user later if needed
      - key: UNIVERSE_PATH
        value: "../universe.csv"
